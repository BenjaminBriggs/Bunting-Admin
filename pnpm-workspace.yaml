allowBuilds:
  '@prisma/client': true
  '@prisma/engines': true
  prisma: true
  sharp: true
  msw: true
  unrs-resolver: true
minimumReleaseAgeExclude:
  - '@aws-sdk/client-kms@3.1070.0'
overrides:
  # jest-runtime 30.4.x calls jest-mock#clearMocksOnScope, which the independently
  # versioned jest-mock doesn't expose consistently here (also fails under Node 26).
  # Jest's sub-packages version independently, so the stack can't be pinned to a
  # single number — but the jest *core* packages publish 30.1.3, which predates that
  # call. Pin the core to 30.1.3 (last green release here) and let the
  # independently-versioned helpers resolve naturally.
  jest: 30.1.3
  jest-cli: 30.1.3
  jest-config: 30.1.3
  jest-runtime: 30.1.3
  '@jest/core': 30.1.3
  '@jest/reporters': 30.1.3
  '@jest/test-sequencer': 30.1.3
  # Coverage pin carried over from the package.json `overrides` field under npm
  # (pnpm reads overrides from here, not from package.json).
  test-exclude: 7.0.1
