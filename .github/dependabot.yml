version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    groups:
      guardian:
        patterns:
          - '@guardian/*'
      aws-sdk:
        patterns:
          - '@aws-sdk/*'
      mui:
        patterns:
          - '@mui/*'
      dev-dependencies:
        dependency-type: development

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly

  - package-ecosystem: docker
    directory: /
    schedule:
      interval: weekly
