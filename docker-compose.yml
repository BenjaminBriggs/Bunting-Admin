services:
  app:
    build:
      context: .
      target: dev
    container_name: bunting-app
    depends_on:
      postgres:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
      dex:
        condition: service_started
    environment:
      NODE_ENV: development
      DATABASE_URL: postgresql://admin:admin123@postgres:5432/bunting_admin
      S3_ENDPOINT: http://minio:9000
      S3_ACCESS_KEY_ID: admin
      S3_SECRET_ACCESS_KEY: admin123
      S3_BUCKET: bunting-configs
      S3_REGION: us-east-1
      # Public read URL the SDK fetches from. Browser-reachable MinIO (not the
      # internal minio:9000 hostname used for server-side uploads).
      CDN_BASE_URL: http://localhost:9000/bunting-configs
      # Signing-key encryption at rest (local AES-GCM scheme; prod uses KMS).
      SIGNING_KEY_SECRET: bunting-dev-signing-secret-change-me
      # Auth: real OIDC against the local dex container (same code path as prod).
      AUTH_MODE: oidc
      OIDC_ISSUER: http://auth.localhost:5556/dex
      OIDC_CLIENT_ID: bunting-admin
      OIDC_CLIENT_SECRET: bunting-dev-secret
      OIDC_PROVIDER_NAME: Dev SSO
      NEXTAUTH_URL: http://localhost:3000
      NEXTAUTH_SECRET: bunting-dev-secret-change-in-production
    ports:
      - '3000:3000'
    # auth.localhost must reach dex (published on the host) from inside the container.
    extra_hosts:
      - 'auth.localhost:host-gateway'
    volumes:
      - ./src:/app/src
      - ./prisma:/app/prisma
      - ./public:/app/public
      - ./next.config.js:/app/next.config.js
      # Shield image-built artefacts from the bind mounts above.
      - /app/node_modules
      - /app/.next
    command: sh -c "npx prisma db push --skip-generate && npm run dev"

  dex:
    image: ghcr.io/dexidp/dex:latest
    container_name: bunting-dex
    command: dex serve /etc/dex/config.yaml
    volumes:
      - ./dex/config.yaml:/etc/dex/config.yaml:ro
    ports:
      - '5556:5556'

  postgres:
    image: postgres:17
    container_name: bunting-postgres
    environment:
      POSTGRES_DB: bunting_admin
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin123
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db:/docker-entrypoint-initdb.d
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U admin -d bunting_admin']
      interval: 5s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: bunting-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: admin
      MINIO_ROOT_PASSWORD: admin123
    ports:
      - '9000:9000' # MinIO API
      - '9001:9001' # MinIO Console (Web UI)
    volumes:
      - minio_data:/data
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:9000/minio/health/live']
      interval: 30s
      timeout: 20s
      retries: 3

  # Optional: MinIO client to create buckets automatically
  minio-init:
    image: minio/mc:latest
    container_name: bunting-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set minio http://minio:9000 admin admin123;
      mc mb minio/bunting-configs --ignore-existing;
      mc anonymous set public minio/bunting-configs;
      echo 'MinIO setup complete';
      "

  pgadmin:
    image: dpage/pgadmin4:9
    container_name: bunting-pgadmin
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@example.com
      PGADMIN_DEFAULT_PASSWORD: admin123
    ports:
      - '5050:80' # open http://localhost:5050
    volumes:
      - pgadmin_data:/var/lib/pgadmin
      - ./pgadmin/servers.json:/pgadmin4/servers.json

volumes:
  postgres_data:
  minio_data:
  pgadmin_data:
